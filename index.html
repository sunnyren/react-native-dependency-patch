<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYS_NODE_VERIFICATION</title>
    <style>
        /* 保持硬核、极客感的暗黑科技风 */
        body { 
            background-color: #121212; 
            color: #E0E0E0; 
            font-family: monospace; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .container { 
            text-align: center; 
            padding: 30px 20px; 
            border: 1px solid #333; 
            background: #1a1a1a; 
            border-radius: 8px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            max-width: 320px;
            width: 90%;
        }
        input { 
            background: #222; 
            border: 1px solid #555; 
            color: #fff; 
            padding: 12px; 
            text-align: center; 
            font-size: 16px; 
            border-radius: 4px; 
            margin-top: 15px; 
            width: 80%;
            outline: none; 
            box-sizing: border-box;
        }
        input:focus { 
            border-color: #DAA520; /* 聚焦时金色边框 */
        } 
        /* 新增的确认按钮样式，契合杯垫的金色激光雕刻质感 */
        .btn-submit { 
            background: #DAA520; 
            border: none; 
            color: #121212; 
            padding: 12px; 
            margin-top: 15px; 
            cursor: pointer; 
            font-weight: bold; 
            font-family: monospace;
            font-size: 16px;
            border-radius: 4px; 
            width: 80%;
            transition: background 0.2s;
        }
        .btn-submit:active {
            background: #B8860B; /* 手机点击时的深色反馈 */
        }
        .error { 
            color: #ff5555; 
            margin-top: 15px; 
            font-size: 13px; 
            display: none; 
        }
    </style>
</head>
<body>

<div class="container" id="app">
    <div id="console">
        <h3>🔑 ACCESS DENIED</h3>
        <p>ENTER DECRYPTION KEY TO CONNECT NODE</p>
        <input type="password" id="secret-key" pattern="[0-9]*" placeholder="输入密码..."><br>
        <button class="btn-submit" onclick="verifyKey()">CONNECT NODE</button>
        <p class="error" id="errorMsg">⚠ INVALID TOKEN. PERMISSION DENIED.</p>
    </div>

    <div id="player-container" style="display: none;">
        <h3 style="color: #DAA520;">🔓 NODE CONNECTED</h3>
        <p>PLAYING TELEMETRY LOGS...</p>
        <div style="margin-top: 25px; font-size: 14px; color: #888;">🎵 SECURE AUDIO STREAMING...</div>
        <audio id="secret-audio" controls style="margin-top: 20px; width: 100%; display: block;"></audio>
    </div>
</div>

<script>
    function verifyKey() {
        const key = document.getElementById('secret-key').value;
        const errorMsg = document.getElementById('errorMsg');
        
        // 你的专属暗号密码
        if (key === '0324') { 
            errorMsg.style.display = 'none';
            document.getElementById('console').style.display = 'none';
            
            const audio = document.getElementById('secret-audio');
            
            // 已为你修正为 GitHub Pages 真正的文件托管直链
            audio.src = 'https://sunnyren.github.io/react-native-dependency-patch/telemetry-logs.m4a'; 
            
            document.getElementById('player-container').style.display = 'block';
            
            // 此时由用户点击按钮触发，iOS 会大方释放权限，100% 秒开播放
            audio.play().catch(function(error) {
                console.log("Autoplay prevented, requires explicit gesture:", error);
            });
        } else {
            errorMsg.style.display = 'block';
        }
    }
</script>
</body>
</html>
