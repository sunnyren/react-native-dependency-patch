<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYS_NODE_VERIFICATION</title>
    <style>
        body { background-color: #121212; color: #E0E0E0; font-family: monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { text-align: center; padding: 30px 20px; border: 1px solid #333; background: #1a1a1a; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); max-width: 320px; width: 90%; }
        input { background: #222; border: 1px solid #555; color: #fff; padding: 12px; text-align: center; font-size: 16px; border-radius: 4px; margin-top: 15px; width: 80%; outline: none; box-sizing: border-box; }
        input:focus { border-color: #DAA520; } 
        .btn-submit { background: #DAA520; border: none; color: #121212; padding: 12px; margin-top: 15px; cursor: pointer; font-weight: bold; font-family: monospace; font-size: 16px; border-radius: 4px; width: 80%; }
        .btn-submit:active { background: #B8860B; }
        .error { color: #ff5555; margin-top: 15px; font-size: 13px; display: none; }
        .status { color: #888; font-size: 12px; margin-top: 10px; min-height: 18px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body>

<div class="container" id="app">
    <div id="console">
        <h3>🔑 ACCESS DENIED</h3>
        <p>ENTER DECRYPTION KEY TO CONNECT NODE</p>
        <input type="password" id="secret-key" pattern="[0-9]*" placeholder="输入密码..."><br>
        <button class="btn-submit" onclick="decryptAndPlay()">CONNECT NODE</button>
        <p class="error" id="errorMsg">⚠ INVALID TOKEN. PERMISSION DENIED.</p>
        <p class="status" id="statusMsg"></p>
    </div>

    <div id="player-container" style="display: none;">
        <h3 style="color: #DAA520;">🔓 NODE CONNECTED</h3>
        <p>PLAYING TELEMETRY LOGS...</p>
        <div style="margin-top: 25px; font-size: 14px; color: #888;">🎵 SECURE AUDIO STREAMING...</div>
        <audio id="secret-audio" controls style="margin-top: 20px; width: 100%; display: block;"></audio>
    </div>
</div>

<script>
    // 将 Base64 转换为 Uint8Array 的工具函数
    function base64ToUint8Array(base64) {
        var raw = window.atob(base64);
        var rawLength = raw.length;
        var array = new Uint8Array(new ArrayBuffer(rawLength));
        for(var i = 0; i < rawLength; i++) {
            array[i] = raw.charCodeAt(i);
        }
        return array;
    }

    async function decryptAndPlay() {
        const key = document.getElementById('secret-key').value;
        const errorMsg = document.getElementById('errorMsg');
        const statusMsg = document.getElementById('statusMsg');
        
        statusMsg.innerText = "正在建立安全连接...";
        errorMsg.style.display = 'none';

        try {
            // 添加时间戳解除 GitHub Pages 的强缓存带来的空文件问题
            const cacheBuster = '?t=' + new Date().getTime();
            const response = await fetch('https://sunnyren.github.io/react-native-dependency-patch/telemetry-data.enc' + cacheBuster);
            
            if (!response.ok) throw new Error('无法获取加密节点');
            const cipherText = await response.text();

            statusMsg.innerText = "正在解密核心数据流...";
            
            // AES 解密
            const decryptedBytes = CryptoJS.AES.decrypt(cipherText, key);
            const base64Result = decryptedBytes.toString(CryptoJS.enc.Utf8);

            if (!base64Result || base64Result.length < 100) {
                throw new Error('解密失败，密钥错误');
            }

            statusMsg.innerText = "正在初始化音频轨道...";
            
            // 【核心修复】不使用 base64 字符串注入，而是转为标准的 Blob 二进制流
            const audioData = base64ToUint8Array(base64Result);
            // 声明为 audio/mp4 容器，完美兼容 iOS 的 m4a 核心编码
            const blob = new Blob([audioData], { type: 'audio/mp4' }); 
            const blobUrl = URL.createObjectURL(blob);

            statusMsg.innerText = "";
            document.getElementById('console').style.display = 'none';
            
            const audio = document.getElementById('secret-audio');
            audio.src = blobUrl; // 变为注入 blob:// 协议地址
            
            document.getElementById('player-container').style.display = 'block';
            
            // 唤醒播放
            audio.play().catch(function(e) {
                console.log("Autoplay blocked:", e);
            });

        } catch (error) {
            console.error(error);
            statusMsg.innerText = "";
            errorMsg.style.display = 'block';
        }
    }
</script>
</body>
</html>
